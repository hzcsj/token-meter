name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate shell scripts
        run: bash -n scripts/*.sh

      - name: Run tests
        run: swift test

      - name: Build release
        run: swift build -c release
